name: 更新并部署新闻软件

on:
  schedule:
    # 每天北京时间 08:15 更新；GitHub cron 使用 UTC
    - cron: "15 0 * * *"
  workflow_dispatch:
    inputs:
      topic:
        description: "可选：指定专题 slug；留空则自动轮换"
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      REPORT_TIMEZONE: ${{ vars.REPORT_TIMEZONE || 'Asia/Shanghai' }}
      REPORT_LANGUAGE: ${{ vars.REPORT_LANGUAGE || 'zh-CN' }}
      REPORT_TOPIC: ${{ inputs.topic }}
      MAX_GLOBAL_NEWS: ${{ vars.MAX_GLOBAL_NEWS || '10' }}
      MAX_CHINA_NEWS: ${{ vars.MAX_CHINA_NEWS || '5' }}
      MAX_US_NEWS: ${{ vars.MAX_US_NEWS || '5' }}
      MIN_DAILY_NEWS: ${{ vars.MIN_DAILY_NEWS || '21' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable && corepack prepare pnpm@11.9.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - name: 抓取新闻并更新网站数据
        run: pnpm update-site
      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v5
      - name: 上传网站
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: 永久保存每日新闻历史
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          git diff --cached --quiet || git commit -m "data: update daily news site [skip ci]"
          git push
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 部署 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
