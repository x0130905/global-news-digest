name: 全球新闻日报

on:
  schedule:
    # GitHub cron 使用 UTC；00:00 UTC = 北京时间 08:00（全年无夏令时）
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "仅生成日报，不发送邮件"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: daily-news-${{ github.ref }}
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      REPORT_TIMEZONE: ${{ vars.REPORT_TIMEZONE || 'Asia/Shanghai' }}
      REPORT_LANGUAGE: ${{ vars.REPORT_LANGUAGE || 'zh-CN' }}
      MAX_GLOBAL_NEWS: ${{ vars.MAX_GLOBAL_NEWS || '10' }}
      MAX_CHINA_NEWS: ${{ vars.MAX_CHINA_NEWS || '5' }}
      MAX_US_NEWS: ${{ vars.MAX_US_NEWS || '5' }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 启用 pnpm
        run: corepack enable
      - name: 按锁文件安装依赖
        run: pnpm install --frozen-lockfile
      - run: pnpm test
      - name: 生成并按需发送日报
        run: pnpm start
      - name: 保存日报和排查日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: global-news-digest-${{ github.run_id }}
          path: |
            output/latest.html
            output/latest.txt
            output/latest.json
            output/run.log
          if-no-files-found: warn
          retention-days: 14
      - name: 持久化最近 7 天历史与发送锁
        if: success() && env.DRY_RUN != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/history.json output/send-lock-*.json -f
          git diff --cached --quiet || git commit -m "chore: update daily digest state [skip ci]"
          git push
