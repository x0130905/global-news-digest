<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#070b14">
  <meta name="description" content="每日自动更新的全球新闻与时政专题应用">
  <title>世界脉搏 · 全球新闻专题</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a class="skip-link" href="#news-grid">跳到新闻列表</a>
  <div class="ambient ambient-one"></div><div class="ambient ambient-two"></div>
  <header class="topbar">
    <a class="brand" href="#" aria-label="世界脉搏首页">
      <span class="brand-mark" aria-hidden="true"><i></i><i></i><i></i></span>
      <span><strong>世界脉搏</strong><small>GLOBAL PULSE</small></span>
    </a>
    <div class="live"><span></span> 每日更新</div>
  </header>

  <section class="command-bar" aria-label="固定新闻工具栏">
    <div class="command-inner">
      <div class="sticky-topic"><span>今日专题</span><strong id="sticky-topic-name">载入中</strong></div>
      <div class="search-wrap">
        <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m21 21-4.4-4.4m2.4-5.1a7.5 7.5 0 1 1-15 0 7.5 7.5 0 0 1 15 0Z"/></svg>
        <label class="sr-only" for="search">搜索新闻</label>
        <input id="search" type="search" placeholder="搜索事件、国家、机构、来源或标签…" autocomplete="off">
        <kbd>⌘ K</kbd>
      </div>
      <div class="date-control">
        <label for="date-picker">选择日期</label>
        <input id="date-picker" type="date" aria-describedby="archive-count">
        <small id="archive-count">永久档案</small>
      </div>
    </div>
  </section>

  <main>
    <section class="hero">
      <div class="eyebrow" id="report-date">正在获取今日日报</div>
      <h1>看见事件，<em>理解影响。</em></h1>
      <p id="overview">聚合不同地区与立场的公开来源，为你梳理过去 24 小时真正重要的全球动态。</p>
    </section>

    <section class="topic-banner" id="topic-banner" aria-labelledby="topic-title">
      <div class="topic-orbit"><span></span></div>
      <div><span class="section-kicker">DAILY FOCUS · 今日专题</span><h2 id="topic-title">载入中</h2><p id="topic-description"></p></div>
      <div class="topic-count"><strong id="featured-count">0</strong><span>篇专题报道</span></div>
    </section>

    <nav class="filters" aria-label="新闻筛选">
      <div class="filter-scroll" id="filter-list">
        <button class="filter active" data-filter="all">全部</button>
        <button class="filter" data-filter="featured">今日专题</button>
        <button class="filter color-filter label-red" data-filter="label:red">红色 · 重点</button>
        <button class="filter color-filter label-blue" data-filter="label:blue">蓝色 · 跟进</button>
        <button class="filter color-filter label-green" data-filter="label:green">绿色 · 已读</button>
        <button class="filter" data-filter="中国重点">中国重点</button>
        <button class="filter" data-filter="美国重点">美国重点</button>
        <button class="filter" data-filter="经济">经济金融</button>
        <button class="filter" data-filter="军事与安全">安全</button>
        <button class="filter" data-filter="科技">科技</button>
        <button class="filter" data-filter="环境">环境</button>
      </div>
      <button class="history-toggle" id="history-toggle" hidden>返回今天</button>
    </nav>

    <section class="results-head">
      <div><span class="section-kicker" id="result-kicker">LATEST INTELLIGENCE</span><h2 id="result-title">最新动态</h2></div>
      <span id="result-count">0 条结果</span>
    </section>
    <div class="status" id="status" role="status">正在载入公开新闻数据…</div>
    <section class="news-grid" id="news-grid" aria-live="polite"></section>
    <button class="load-more" id="load-more" hidden>加载更多</button>
  </main>

  <footer>
    <div class="footer-brand">世界脉搏 <span>·</span> 全球新闻专题</div>
    <p>内容由公开 RSS 与 GDELT 自动聚合和摘要。重要决策前请核对原始来源。</p>
    <p id="updated-at"></p>
  </footer>
  <noscript>此应用需要 JavaScript 来加载和搜索新闻数据。</noscript>
  <script type="module" src="app.js"></script>
</body>
</html>
